<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Dancing+Script:wght@400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header bg-black">
        <nav class="nav-container flex justify-center gap-8 p-4 text-white bg-black">
            <a href="#home">Home</a>
            <a href="#menu">Menu</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
        <section class="main-section flex flex-col justify-center md:flex-row text-center  ">
            <div class="absolute inset-0 bg-[url('images/main.png')] bg-cover bg-center opacity-30 md:hidden">
            </div>
            <div class="left h-screen w-screen md:w-1/2 flex flex-col gap-10 justify-center px-20">
                <h1 class="name-tag text-7xl text-white font-light mb-6">FROSTY FUSION</h1>
                <p class="tagline text-5xl text-gray-300 italic font-semibold">The art of sweet treats</p>

            </div>
            <div class="image-section flex justify-center md:flex w-1/2 flex justify-end items-center pr-10">
                <img class="main-image hidden md:block w-[700px] h-screen" src="images/main.png" alt="boba cup">

            </div>
        </section>
    </header>
</body>
</html>
